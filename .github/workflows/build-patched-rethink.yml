name: Build patched Rethink (WG handoff fix)

on:
  workflow_dispatch:
    inputs:
      app_tag:
        description: "rethink-app git tag/branch"
        required: true
        default: "v0.5.5y"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout your fork (for the patch script)
        uses: actions/checkout@v4
        with:
          path: patchsrc

      - name: Checkout rethink-app
        uses: actions/checkout@v4
        with:
          repository: celzero/rethink-app
          ref: ${{ github.event.inputs.app_tag }}
          path: rethink-app

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: NDK + SDK
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;34.0.0"

      - name: Apply handoff fix
        run: |
          set -euo pipefail
          python3 patchsrc/wg-handoff-fix.py \
            rethink-app/app/src/main/java/com/celzero/bravedns/service/BraveVPNService.kt
          echo "--- patch 1 (nws.isEmpty fallback) ---"
          grep -n "nws-empty activeNw fallback" \
            rethink-app/app/src/main/java/com/celzero/bravedns/service/BraveVPNService.kt
          echo "--- patch 2 (useActive fallback) ---"
          grep -n "useActive activeNw fallback" \
            rethink-app/app/src/main/java/com/celzero/bravedns/service/BraveVPNService.kt

      - name: Build APK
        working-directory: rethink-app
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew :app:assembleFdroidFullDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rethink-patched-handoff-fix
          path: rethink-app/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
